name: Build Looper extension release zips

# Fires only when a Looper-extension version tag is pushed (looper-ext-v1.2.3).
# It builds the two warning-free store zips and attaches them to a GitHub Release.
# It does NOT publish to the Chrome Web Store or AMO: you download the zips from
# the release and upload them yourself. Pushing to main is unaffected (that is the
# separate Pages deploy, which excludes /extensions/).
on:
  push:
    tags:
      - 'looper-ext-v*'

permissions:
  contents: write   # needed to create the release and attach the zips

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build per-browser store zips
        run: cd extensions/looper && sh pack.sh
      - name: Publish GitHub Release with the zips
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            extensions/looper/dist/etude-looper-chrome-*.zip \
            extensions/looper/dist/etude-looper-firefox-*.zip \
            --title "Looper extension ${{ github.ref_name }}" \
            --notes "Store zips built from ${{ github.ref_name }}. Upload etude-looper-chrome-*.zip to the Chrome Web Store and etude-looper-firefox-*.zip to Firefox AMO. This does not publish to the stores."
